<h2 mat-dialog-title>Delete Task</h2>
<mat-dialog-content>
    <div style="display:flex; flex-direction:column;">
    <p style="font-size: 14px; color: #666; margin: 8px 0 0;">Are you sure you want to delete this task?</p>
    </div>
</mat-dialog-content>
<mat-dialog-actions>
    <button matButton (click)="onNoClick()">Cancel</button>
    <button matButton [mat-dialog-close]=true cdkFocusInitial>Delete</button>
</mat-dialog-actions>
